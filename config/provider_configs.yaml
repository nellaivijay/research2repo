# Provider Configurations for Research2Repo
# This file contains configuration for different AI providers

gemini:
  # Google Gemini provider configuration
  api_key_env: GEMINI_API_KEY
  base_url: https://generativelanguage.googleapis.com
  api_version: v1beta
  
  # Connection settings
  timeout: 120
  max_retries: 3
  retry_delay: 5
  
  # Rate limiting
  requests_per_minute: 60
  tokens_per_minute: 32000
  
  # Model configurations
  models:
    gemini-1.5-pro:
      capabilities:
        - text_generation
        - vision
        - long_context
      max_tokens: 2000000
      cost_per_1k_input: 0.0035
      cost_per_1k_output: 0.0105
      recommended_for:
        - complex_analysis
        - code_generation
        - long_documents
    
    gemini-1.5-flash:
      capabilities:
        - text_generation
        - vision
        - long_context
      max_tokens: 1000000
      cost_per_1k_input: 0.00015
      cost_per_1k_output: 0.0006
      recommended_for:
        - quick_analysis
        - simple_tasks
        - cost_sensitive
    
    gemini-1.0-pro:
      capabilities:
        - text_generation
        - vision
      max_tokens: 32000
      cost_per_1k_input: 0.0005
      cost_per_1k_output: 0.0015
      recommended_for:
        - basic_tasks
        - legacy_compatibility

