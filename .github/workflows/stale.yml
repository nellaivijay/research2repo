name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had any activity for 30 days. It will be closed if no further activity occurs in 14 days.'
          close-issue-message: 'This issue has been closed due to inactivity for 44 days. Feel free to reopen if it still relevant.'
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-pr-message: 'This pull request has been automatically marked as stale because it has not had any activity for 30 days. It will be closed if no further activity occurs in 14 days.'
          close-pr-message: 'This pull request has been closed due to inactivity for 44 days. Feel free to reopen if it still relevant.'
          days-before-pr-stale: 30
          days-before-pr-close: 14
          operations-per-run: 100