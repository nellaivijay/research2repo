# Pytest Configuration for Research2Repo

[tool.pytest.ini_options]
# Test discovery patterns
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Test paths
testpaths = ["tests"]

# Output options
addopts = [
    "-v",  # verbose
    "--strict-markers",  # strict marker checking
    "--tb=short",  # shorter tracebacks
    "--cov=architecture",  # coverage for architecture package
    "--cov=advanced",  # coverage for advanced package
    "--cov-report=term-missing",  # coverage report in terminal
    "--cov-report=html",  # coverage report in HTML
    "--cov-report=xml",  # coverage report in XML
]

# Markers
markers = [
    "unit: marks tests as unit tests",
    "integration: marks tests as integration tests",
    "benchmark: marks tests as benchmark tests",
    "slow: marks tests as slow running",
    "requires_api: marks tests that require API keys",
    "mock: marks tests that use mock providers"
]

# Coverage options
[tool.coverage.run]
source = ["architecture", "advanced", "config"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/migrations/*"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod"
]

[tool.coverage.html]
directory = "htmlcov"